name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Verify
        run: ./gradlew check --no-daemon

  build:
    name: Build tagged artifact
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected release tag format vX.X.X, got '$tag'" >&2
            exit 1
          fi
          version="${tag#v}"
          gradle_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ "$gradle_version" != "$version" ]]; then
            echo "Tag $tag expects mod_version=$version, but gradle.properties has mod_version=$gradle_version" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Select mod JAR
        id: artifact
        shell: bash
        run: |
          jar_path="$(find build/libs -maxdepth 1 -type f -name '*-${{ steps.release.outputs.version }}.jar' ! -name '*-sources.jar' | sort | head -n 1)"
          if [[ -z "$jar_path" ]]; then
            echo "No mod JAR for version ${{ steps.release.outputs.version }} found in build/libs" >&2
            exit 1
          fi
          echo "jar_path=$jar_path" >> "$GITHUB_OUTPUT"

      - name: Prepare release asset
        id: release_asset
        shell: bash
        run: |
          minecraft_version="$(sed -n 's/^minecraft_version=//p' gradle.properties)"
          asset_path="build/release/minecraft-daq-${{ steps.release.outputs.tag }}-mc${minecraft_version}.jar"
          mkdir -p "$(dirname "$asset_path")"
          cp "${{ steps.artifact.outputs.jar_path }}" "$asset_path"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload mod artifacts
        uses: actions/upload-artifact@v6
        with:
          name: minecraft-daq-${{ steps.release.outputs.tag }}
          path: ${{ steps.release_asset.outputs.asset_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Minecraft DAQ $tag"
          fi
          gh release upload "$tag" "${{ steps.release_asset.outputs.asset_path }}" --clobber
